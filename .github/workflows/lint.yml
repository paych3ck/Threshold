name: Lint Ren'Py Mod

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setting up environment
        run: |
          sudo apt-get update
          sudo apt-get install --yes wget bzip2 mesa-utils unzip python3 python3-pip python3-venv
          python3 -m venv /opt/venv
          /opt/venv/bin/pip install gdown

      - name: Everlasting Summer download
        run: |
          if [ ! -d "game" ]; then
            google_drive_id='1MM3B6VRDXJDwQphj_sWuG8AthqIu8s-y'
            /opt/venv/bin/gdown --id "${google_drive_id}" -O "Everlasting Summer.zip"
            unzip -q "Everlasting Summer.zip"
            rm "Everlasting Summer.zip"
          else
            echo "Everlasting Summer уже существует."
          fi

      - name: Project lint
        run: |
          sdk_version='8.1.3'
          sdk_name="renpy-${sdk_version}-sdk"
          "./${sdk_name}/renpy.sh" "Everlasting Summer/game/" lint
