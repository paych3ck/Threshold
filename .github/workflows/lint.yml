name: Lint Ren'Py Mod

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Ren'Py Lint
        uses: ./.github/actions/rpy-lint
        with:
          sdk_version: '8.1.3'
          project_path: '.'
          google_drive_id: '1MM3B6VRDXJDwQphj_sWuG8AthqIu8s-y'
